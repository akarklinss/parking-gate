
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#111827;background:#eef1f5}*{box-sizing:border-box}body{margin:0}button,input,select{font:inherit}.shell{width:min(100%,720px);margin:auto;padding:max(16px,env(safe-area-inset-top)) 16px 32px}.brand,.topbar,.topbar>div,.modal header{display:flex;align-items:center;gap:12px}.brand{margin:18px 0}.logo{display:grid;place-items:center;width:56px;height:56px;border-radius:16px;background:#111827;color:#fff;font-size:32px;font-weight:900}.topbar{justify-content:space-between}.topbar h1,.brand h1{margin:0}.topbar p,.brand p{margin:3px 0;color:#667085}.topbar button{width:48px}.card,.result,.stats>div{background:#fff;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px #10182812}.form-grid{display:grid;gap:10px}label{font-weight:700;color:#475467}input,select{display:block;width:100%;padding:14px;margin-top:7px;border:1px solid #d0d5dd;border-radius:12px;background:#fff}button{border:0;border-radius:12px;padding:13px 15px;min-height:50px;background:#111827;color:#fff;font-weight:800;cursor:pointer;position:relative;z-index:20}button:disabled{opacity:.45}.primary{width:100%}.secondary{width:100%;background:#667085;margin-top:8px}.danger{color:#b42318}.ghost{background:#fee4e2}.error-text{color:#b42318}.mode{display:grid;grid-template-columns:1fr 1fr;gap:7px;background:#d0d5dd;padding:5px;border-radius:16px;margin-bottom:12px}.mode button{background:transparent;color:#344054}.mode .active{background:#111827;color:#fff}.mode .exit{background:#7a2e0e}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.stats>div{text-align:center;padding:12px 5px}.stats strong,.stats span{display:block}.stats strong{font-size:27px}.stats span{font-size:11px;color:#667085}.camera-stage{position:relative;overflow:hidden;border-radius:16px;background:#000;min-height:250px;isolation:isolate}.camera-stage video{display:block;width:100%;height:360px;object-fit:cover;pointer-events:none;position:relative;z-index:1}.plate-frame{position:absolute;left:10%;right:10%;top:37%;height:27%;border:4px solid #fff;border-radius:12px;pointer-events:none;z-index:2}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;position:relative;z-index:10}.accent{background:#2563eb}.muted{color:#667085}.plate-preview{display:block;width:100%;max-height:150px;object-fit:contain;background:#fff;border-radius:10px}.plate-input{font-size:42px;text-align:center;letter-spacing:3px;font-weight:900}.big{min-height:60px}.result{text-align:center;min-height:220px;display:grid;place-content:center}.result>b{font-size:44px}.result h2{margin:8px 0;font-size:30px}.big-plate{font-size:44px;font-weight:950}.result.ok{background:#d1fadf;color:#067647}.result.warn{background:#fef0c7;color:#b54708}.result.bad{background:#fee4e2;color:#b42318}.result.neutral{background:#eaecf0;color:#344054}.online{padding:7px 10px;border-radius:999px;font-size:11px;font-weight:900}.online.yes{background:#d1fadf;color:#067647}.online.no{background:#fee4e2;color:#b42318}.modal-backdrop{position:fixed;inset:0;background:#111827cc;z-index:100;display:grid;place-items:center;padding:14px}.modal{width:min(96vw,760px);max-height:92vh;overflow:auto;background:#fff;border-radius:22px;padding:18px}.modal header{justify-content:space-between}.admin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.admin-grid div{background:#f2f4f7;padding:12px;text-align:center;border-radius:12px}.admin-grid strong,.admin-grid span{display:block}.qr-box{text-align:center;margin:18px 0}.logs{display:grid;gap:8px}.logs article{border:1px solid #d0d5dd;border-radius:10px;padding:10px}.logs b,.logs span,.logs small{display:block}.logs span,.logs small{color:#667085}@media(max-width:500px){.stats,.admin-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.camera-stage video{height:330px}}
