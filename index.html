<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Parking Gate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Parking Gate</h1>
        <p>Pasākuma iebraukšanas kontrole</p>
      </div>
      <button id="refreshStatsBtn" class="icon-btn">↻</button>
    </header>

    <section class="stats">
      <div>
        <span id="totalCount">–</span>
        <small>Sarakstā</small>
      </div>
      <div>
        <span id="enteredCount">–</span>
        <small>Iebraukuši</small>
      </div>
      <div>
        <span id="remainingCount">–</span>
        <small>Atlikuši</small>
      </div>
    </section>

    <section class="camera-card">
      <video id="cameraPreview" autoplay playsinline muted></video>
      <div class="camera-actions">
        <button id="startCameraBtn">📷 Sākt kameru</button>
        <button id="stopCameraBtn" class="secondary">Apturēt</button>
      </div>
      <p id="cameraStatus">Kamera nav ieslēgta. Šajā versijā kamera ir sagatavota nākamajam OCR solim.</p>
    </section>

    <section class="plate-card">
      <label for="plateInput">Auto numurs</label>
      <input id="plateInput" type="text" inputmode="latin" autocomplete="off" placeholder="Piemēram, AB1234">
      <button id="checkBtn" class="primary">Pārbaudīt / Ielaist</button>
      <button id="clearBtn" class="secondary">Notīrīt</button>
    </section>

    <section id="result" class="result neutral">
      Ievadi auto numuru un spied “Pārbaudīt / Ielaist”.
    </section>
  </main>

<script src="api.js?v=10"></script>
<script src="camera.js?v=10"></script>
<script src="app.js?v=10"></script>
</body>
</html>
